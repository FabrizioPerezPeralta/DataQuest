rules:
  - id: java-sql-injection
    pattern: |
      $QUERY = "..." + $VAR + "...";
    message: "Potential SQL injection - use parameterized queries"
    languages: [java]
    severity: ERROR

  - id: java-hardcoded-secrets
    pattern-either:
      - pattern: '$PASSWORD = "..."'
      - pattern: '$SECRET = "..."'
      - pattern: '$API_KEY = "..."'
    message: "Hardcoded secret detected"
    languages: [java]
    severity: WARNING

  - id: java-jwt-none-algorithm
    pattern: |
      Jwts.builder().signWith($KEY).compact()
    message: "JWT should use a strong signing key"
    languages: [java]
    severity: INFO
