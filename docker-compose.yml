version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: dataquest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASS:-rootpass}
      POSTGRES_DB: ${DB_NAME:-dataquest}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      timeout: 10s
      retries: 10

  app:
    build: .
    container_name: dataquest-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-dataquest}
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS:-rootpass}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      JWT_SECRET: ${JWT_SECRET:-dataquest-jwt-secret-key-must-be-32-chars-long!}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
