server:
  port: 8080

spring:
  application:
    name: dataquest-api
  datasource:
    url: jdbc:h2:mem:dataquest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console

springdoc:
  api-docs:
    path: /docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

app:
  jwt:
    secret: ${JWT_SECRET:dataquest-jwt-secret-key-must-be-32-chars-long!}
    expiration-ms: 86400000
  security:
    rate-limit:
      max-attempts: 5
      window-minutes: 15

logging:
  level:
    com.dataquest: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
